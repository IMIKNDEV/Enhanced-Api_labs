services:
    laravel.test:
        build:
            context: .
            dockerfile: Dockerfile
        image: sail-8.4/app
        ports:
            - '${APP_PORT:-80}:80'
            - '${VITE_PORT:-5173}:${VITE_PORT:-5173}'
        environment:
            DB_HOST: mysql
        volumes:
            - '.:/var/www/html'
        depends_on:
            - mysql
            - phpmyadmin
        networks:
            - sail

    mysql:
        image: 'mysql:8.0'
        ports:
            - '${DB_PORT:-3306}:3306'
        environment:
            MYSQL_ROOT_PASSWORD: '${DB_PASSWORD:-password}'
            MYSQL_DATABASE: '${DB_DATABASE:-laravel}'
            MYSQL_USER: '${DB_USERNAME:-sail}'
            MYSQL_PASSWORD: '${DB_PASSWORD:-password}'
        volumes:
            - 'sail-mysql:/var/lib/mysql'
        healthcheck:
            test: ["CMD", "mysqladmin", "ping", "-p${DB_PASSWORD}"]
            retries: 3
            timeout: 5s
        networks:
            - sail

    phpmyadmin:
        image: 'phpmyadmin:latest'
        ports:
            - '8080:80'
        environment:
            PMA_HOST: mysql
            PMA_USER: '${DB_USERNAME:-sail}'
            PMA_PASSWORD: '${DB_PASSWORD:-password}'
        depends_on:
            - mysql
        networks:
            - sail

volumes:
    sail-mysql:
        driver: local

networks:
    sail:
        driver: bridge
